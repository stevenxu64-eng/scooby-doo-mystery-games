<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="wallg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#241b3d"/>
      <stop offset="70%" stop-color="#3d2f56"/>
      <stop offset="100%" stop-color="#4a3a63"/>
    </linearGradient>
    <linearGradient id="floorg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a4025"/>
      <stop offset="100%" stop-color="#2a1d10"/>
    </linearGradient>
    <radialGradient id="moonbeam" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#cdd7ff" stop-opacity="0.28"/>
      <stop offset="60%" stop-color="#cdd7ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vign" cx="50%" cy="50%" r="75%">
      <stop offset="60%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
  </defs>

  <!-- walls & floor -->
  <rect width="1600" height="560" fill="url(#wallg)"/>
  <rect y="560" width="1600" height="340" fill="url(#floorg)"/>
  <path d="M0 560 H1600 V575 H0 Z" fill="#1b1208"/>
  <!-- floor boards -->
  <g stroke="#1f150a" stroke-width="3" opacity="0.5">
    <path d="M200 900 L420 560 M500 900 L620 560 M800 900 L800 560 M1100 900 L980 560 M1400 900 L1180 560"/>
  </g>

  <!-- skylight moonbeam -->
  <rect width="1600" height="900" fill="url(#moonbeam)"/>
  <path d="M700 0 L560 560 L1040 560 L900 0 Z" fill="#cdd7ff" opacity="0.07"/>

  <!-- chandelier -->
  <path d="M800 0 V70" stroke="#171021" stroke-width="6"/>
  <path d="M720 110 Q800 160 880 110 L860 90 Q800 130 740 90 Z" fill="#171021"/>
  <circle cx="726" cy="102" r="9" fill="#ffd98a" opacity="0.9"/>
  <circle cx="800" cy="126" r="9" fill="#ffd98a" opacity="0.9"/>
  <circle cx="874" cy="102" r="9" fill="#ffd98a" opacity="0.9"/>

  <!-- wainscot -->
  <rect y="470" width="1600" height="90" fill="#312447"/>
  <path d="M0 470 H1600" stroke="#54446f" stroke-width="4"/>

  <!-- JANITOR CLOSET DOOR (hotspot x2-14%, y28-76%) -->
  <rect x="40" y="245" width="180" height="440" rx="8" fill="#241708"/>
  <rect x="56" y="262" width="148" height="406" rx="6" fill="#3d2812"/>
  <rect x="72" y="290" width="116" height="150" rx="4" fill="#2c1c0c"/>
  <rect x="72" y="470" width="116" height="170" rx="4" fill="#2c1c0c"/>
  <circle cx="188" cy="462" r="9" fill="#c9a24a"/>
  <rect x="150" y="430" width="26" height="40" rx="4" fill="#6b6b70"/>
  <rect x="78" y="330" width="104" height="26" rx="3" fill="#101d2c" transform="rotate(-2 130 343)"/>
  <text x="130" y="349" font-family="Trebuchet MS" font-size="17" fill="#d8c795" text-anchor="middle" transform="rotate(-2 130 343)">MAINTENANCE</text>

  <!-- dust-sheet furniture -->
  <path d="M300 660 q30 -90 90 -70 q60 15 55 95 q-5 45 -75 40 q-75 -5 -70 -65" fill="#8d87a3"/>
  <path d="M310 655 q40 20 120 5" stroke="#6f6987" stroke-width="4" fill="none"/>
  <path d="M1280 700 q20 -110 105 -90 q80 20 70 115 q-8 55 -95 45 q-88 -10 -80 -70" fill="#847e9b"/>
  <path d="M1295 690 q55 25 145 0" stroke="#67617f" stroke-width="4" fill="none"/>

  <!-- FRONT DESK (drawer hotspot 38-54% x, 62-78% y; ledger 40-52% x, 48-58% y) -->
  <rect x="580" y="430" width="330" height="60" rx="6" fill="#6e4a22"/>
  <rect x="596" y="490" width="298" height="220" fill="#553517"/>
  <rect x="620" y="552" width="250" height="130" rx="6" fill="#452a10"/>
  <rect x="700" y="596" width="90" height="16" rx="8" fill="#c9a24a"/>
  <path d="M596 490 h298" stroke="#7c5628" stroke-width="6"/>
  <!-- ledger book on desk -->
  <g transform="rotate(-4 730 452)">
    <rect x="648" y="432" width="164" height="44" rx="4" fill="#7c1f1f"/>
    <rect x="656" y="438" width="148" height="32" rx="2" fill="#e8dcb8"/>
    <path d="M730 438 v32" stroke="#b8a67c" stroke-width="2"/>
    <path d="M668 448 h48 M668 458 h44 M742 448 h48 M742 458 h40" stroke="#8f815c" stroke-width="2"/>
  </g>
  <!-- desk bell -->
  <path d="M850 452 a16 14 0 0 1 32 0 z" fill="#d3b25c"/>

  <!-- MR. CRANE (hotspot 62-77% x, 30-76% y) -->
  <g>
    <ellipse cx="1105" cy="692" rx="60" ry="14" fill="#000" opacity="0.35"/>
    <rect x="1068" y="418" width="74" height="200" rx="26" fill="#3a4a52"/>
    <rect x="1080" y="430" width="50" height="90" fill="#c9c2ae"/>
    <path d="M1094 430 l11 34 l11 -34 z" fill="#5d2a2a"/>
    <rect x="1070" y="610" width="30" height="82" rx="8" fill="#2c3940"/>
    <rect x="1110" y="610" width="30" height="82" rx="8" fill="#2c3940"/>
    <rect x="1052" y="430" width="22" height="120" rx="10" fill="#3a4a52"/>
    <rect x="1136" y="430" width="22" height="120" rx="10" fill="#3a4a52"/>
    <ellipse cx="1063" cy="560" rx="11" ry="12" fill="#d8b98f"/>
    <!-- lantern in hand -->
    <rect x="1140" y="540" width="34" height="44" rx="6" fill="#2b2b30"/>
    <rect x="1148" y="548" width="18" height="28" fill="#ffd98a" opacity="0.95"/>
    <circle cx="1157" cy="562" r="26" fill="#ffd98a" opacity="0.18"/>
    <!-- head -->
    <ellipse cx="1105" cy="382" rx="30" ry="34" fill="#d8b98f"/>
    <path d="M1075 372 q8 -26 30 -26 q22 0 30 26 q-8 -8 -30 -8 q-22 0 -30 8" fill="#9aa0a6"/>
    <circle cx="1094" cy="382" r="3.5" fill="#222"/>
    <circle cx="1116" cy="382" r="3.5" fill="#222"/>
    <path d="M1090 374 l9 -4 M1120 374 l-9 -4" stroke="#555" stroke-width="2.5"/>
    <path d="M1096 404 q9 4 18 0" stroke="#8a6c50" stroke-width="2.5" fill="none"/>
  </g>

  <!-- POSTER (hotspot 84-96% x, 22-48% y) -->
  <rect x="1336" y="192" width="200" height="248" fill="#5c4a22"/>
  <rect x="1348" y="204" width="176" height="224" fill="#e4d8b4"/>
  <text x="1436" y="236" font-family="Trebuchet MS" font-size="22" font-weight="bold" fill="#7a5b1e" text-anchor="middle">GRAND PALM</text>
  <text x="1436" y="260" font-family="Trebuchet MS" font-size="16" fill="#7a5b1e" text-anchor="middle">RESORT</text>
  <path d="M1380 330 q10 -40 40 -30 q6 -22 30 -12 q22 8 12 34 q18 14 -2 30 q-30 20 -60 4 q-28 -10 -20 -26" fill="#59c26a" opacity="0.85"/>
  <circle cx="1416" cy="316" r="4" fill="#143318"/>
  <circle cx="1438" cy="314" r="4" fill="#143318"/>
  <text x="1436" y="400" font-family="Trebuchet MS" font-size="13" fill="#3f6b46" text-anchor="middle">THE PHANTOM GUEST</text>
  <text x="1436" y="418" font-family="Trebuchet MS" font-size="13" fill="#3f6b46" text-anchor="middle">CHECKS IN...</text>

  <!-- east archway hint -->
  <path d="M1560 560 V300 q40 -20 40 20 V560 Z" fill="#171021"/>

  <rect width="1600" height="900" fill="url(#vign)"/>
</svg>
