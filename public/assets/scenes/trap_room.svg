<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bwall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#081710"/>
      <stop offset="55%" stop-color="#0f2c1c"/>
      <stop offset="100%" stop-color="#1a4a2e"/>
    </linearGradient>
    <linearGradient id="bfloor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#153823"/>
      <stop offset="100%" stop-color="#06110a"/>
    </linearGradient>
    <radialGradient id="greenglow" cx="50%" cy="55%" r="65%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="furnaceglow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#ffb347" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffb347" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vign4" cx="50%" cy="46%" r="72%">
      <stop offset="52%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.66"/>
    </radialGradient>
    <filter id="grain4">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.055"/></feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
  </defs>

  <rect width="1600" height="640" fill="url(#bwall)"/>
  <rect y="640" width="1600" height="260" fill="url(#bfloor)"/>
  <rect width="1600" height="900" fill="url(#greenglow)"/>

  <!-- back-wall brick texture -->
  <g stroke="#0a2013" stroke-width="2.5" opacity="0.7">
    <path d="M0 180 H1600 M0 260 H1600 M0 340 H1600 M0 420 H1600 M0 500 H1600 M0 580 H1600"/>
    <path d="M120 180 V260 M320 180 V260 M520 180 V260 M220 260 V340 M420 260 V340 M120 340 V420 M320 340 V420 M220 420 V500 M420 420 V500 M1480 180 V260 M1380 260 V340 M1480 340 V420"/>
  </g>

  <!-- boiler -->
  <ellipse cx="1010" cy="640" rx="180" ry="30" fill="#000" opacity="0.45"/>
  <ellipse cx="1010" cy="330" rx="152" ry="48" fill="#2b3b43"/>
  <rect x="858" y="330" width="304" height="292" fill="#354852"/>
  <ellipse cx="1010" cy="622" rx="152" ry="44" fill="#243139"/>
  <path d="M858 330 v292 M1162 330 v292" stroke="#1c262c" stroke-width="6"/>
  <g stroke="#1c262c" stroke-width="7">
    <path d="M884 362 V600 M950 344 V614 M1070 344 V614 M1136 362 V600"/>
  </g>
  <g fill="#4a616d">
    <circle cx="884" cy="400" r="5"/><circle cx="884" cy="470" r="5"/><circle cx="884" cy="540" r="5"/>
    <circle cx="1136" cy="400" r="5"/><circle cx="1136" cy="470" r="5"/><circle cx="1136" cy="540" r="5"/>
  </g>
  <!-- pressure gauge -->
  <circle cx="1010" cy="428" r="36" fill="#131a1f"/>
  <circle cx="1010" cy="428" r="27" fill="#e8dcb4"/>
  <path d="M1010 428 L1026 410" stroke="#8c2424" stroke-width="4"/>
  <path d="M990 442 a27 27 0 0 1 6 -32" stroke="#8c2424" stroke-width="4" fill="none"/>
  <circle cx="1010" cy="428" r="4" fill="#131a1f"/>
  <!-- furnace door -->
  <rect x="954" y="512" width="112" height="76" rx="10" fill="#131a1f"/>
  <rect x="966" y="524" width="88" height="52" rx="6" fill="#0a0e11"/>
  <ellipse cx="1010" cy="550" rx="34" ry="16" fill="url(#furnaceglow)"/>
  <path d="M978 560 q10 -18 20 0 q10 -16 20 0 q10 -18 22 0" stroke="#ff9e3d" stroke-width="4" fill="none"/>
  <path d="M966 550 h88" stroke="#26333b" stroke-width="3"/>
  <!-- pipes + valves + steam -->
  <path d="M884 330 q-24 -124 56 -146 L940 92" stroke="#42606e" stroke-width="22" fill="none"/>
  <path d="M1136 330 q30 -104 -18 -166" stroke="#42606e" stroke-width="18" fill="none"/>
  <path d="M1240 640 V420 q0 -30 30 -30 h90" stroke="#3a5462" stroke-width="16" fill="none"/>
  <circle cx="940" cy="120" r="17" fill="#2b3b43"/>
  <path d="M925 120 h30 M940 105 v30" stroke="#1c262c" stroke-width="4"/>
  <circle cx="1350" cy="390" r="13" fill="#2b3b43"/>
  <g fill="#9fc4b1" opacity="0.35">
    <ellipse cx="944" cy="62" rx="16" ry="10"/>
    <ellipse cx="962" cy="40" rx="22" ry="12"/>
    <ellipse cx="988" cy="20" rx="28" ry="13"/>
  </g>

  <!-- hanging chains -->
  <path d="M300 104 V210 M304 210 q-8 10 0 20 q8 10 0 20 q-8 10 0 20" stroke="#22352a" stroke-width="6" fill="none"/>
  <path d="M1490 104 V190 M1494 190 q-8 10 0 20 q8 10 0 20" stroke="#22352a" stroke-width="6" fill="none"/>

  <!-- ceiling beam + IRON HOOK (hotspot 40-52% x, 8-26% y) — net & rope are game overlays -->
  <rect x="200" y="58" width="1200" height="46" fill="#241a0e"/>
  <path d="M200 58 h1200 M200 104 h1200" stroke="#0f0a05" stroke-width="6"/>
  <g fill="#0f0a05" opacity="0.8">
    <rect x="330" y="66" width="10" height="30"/><rect x="640" y="66" width="10" height="30"/>
    <rect x="950" y="66" width="10" height="30"/><rect x="1260" y="66" width="10" height="30"/>
  </g>
  <path d="M736 104 v54 q0 36 32 36 q28 0 28 -28 q0 -19 -19 -19" stroke="#7f878d" stroke-width="17" fill="none" stroke-linecap="round"/>
  <path d="M736 104 v54" stroke="#5d666c" stroke-width="17" stroke-linecap="round"/>

  <!-- BAIT CRATE (hotspot 42-58% x, 56-76% y) — the snack is a game overlay -->
  <g>
    <ellipse cx="800" cy="702" rx="132" ry="26" fill="#000" opacity="0.45"/>
    <path d="M672 540 L800 500 L928 540 L928 660 L800 700 L672 660 Z" fill="#75501f"/>
    <path d="M672 540 L800 580 L928 540 M800 580 V700" stroke="#3f2a10" stroke-width="7" fill="none"/>
    <path d="M672 540 L800 500 L928 540 L800 580 Z" fill="#b0863c"/>
    <path d="M700 600 h72 M820 600 h72 M700 636 h72 M820 636 h72" stroke="#553917" stroke-width="6"/>
    <path d="M690 545 l110 33 M910 545 l-110 33" stroke="#8a6428" stroke-width="3" opacity="0.8"/>
    <text x="800" y="668" font-family="Trebuchet MS" font-size="20" font-weight="bold" fill="#3f2a10" text-anchor="middle" opacity="0.8">FRAGILE</text>
  </g>

  <!-- costume rod on the wall (hotspot 76-90% x, 28-62% y) — the sheet itself is a game overlay -->
  <path d="M1240 244 h140" stroke="#39312a" stroke-width="8"/>
  <path d="M1306 244 v-18 h12 v18" stroke="#39312a" stroke-width="6" fill="none"/>

  <!-- LEVER PANEL (hotspot 10-20% x, 44-70% y) — the handle is a game overlay -->
  <g>
    <rect x="170" y="410" width="132" height="212" rx="12" fill="#2b3b43"/>
    <rect x="170" y="410" width="132" height="212" rx="12" fill="none" stroke="#1c262c" stroke-width="4"/>
    <rect x="188" y="428" width="96" height="62" rx="6" fill="#0e161b"/>
    <text x="236" y="454" font-family="Trebuchet MS" font-size="15" font-weight="bold" fill="#e8b73a" text-anchor="middle">LAUNDRY</text>
    <text x="236" y="474" font-family="Trebuchet MS" font-size="15" font-weight="bold" fill="#e8b73a" text-anchor="middle">NET</text>
    <path d="M212 508 a26 26 0 0 1 48 0" stroke="#0e161b" stroke-width="5" fill="none"/>
    <circle cx="236" cy="562" r="16" fill="#131a1f"/>
    <circle cx="236" cy="562" r="7" fill="#26333b"/>
    <g fill="#0e161b">
      <circle cx="184" cy="424" r="4"/><circle cx="288" cy="424" r="4"/>
      <circle cx="184" cy="608" r="4"/><circle cx="288" cy="608" r="4"/>
    </g>
  </g>

  <!-- glowing footprints -->
  <g fill="#4ade80" opacity="0.5">
    <ellipse cx="480" cy="750" rx="16" ry="8" transform="rotate(18 480 750)"/>
    <ellipse cx="560" cy="780" rx="16" ry="8" transform="rotate(24 560 780)"/>
    <ellipse cx="650" cy="806" rx="16" ry="8" transform="rotate(16 650 806)"/>
    <ellipse cx="1060" cy="760" rx="16" ry="8" transform="rotate(-20 1060 760)"/>
    <ellipse cx="1150" cy="730" rx="16" ry="8" transform="rotate(-26 1150 730)"/>
    <ellipse cx="1230" cy="694" rx="16" ry="8" transform="rotate(-30 1230 694)"/>
  </g>
  <!-- drips of glow paint -->
  <g fill="#4ade80" opacity="0.35">
    <circle cx="1268" cy="560" r="5"/><circle cx="1284" cy="600" r="3.5"/><circle cx="1252" cy="628" r="4"/>
  </g>

  <rect width="1600" height="900" filter="url(#grain4)" opacity="0.5"/>
  <rect width="1600" height="900" fill="url(#vign4)"/>
</svg>
