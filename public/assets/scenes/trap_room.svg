<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bwall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1f14"/>
      <stop offset="100%" stop-color="#153a26"/>
    </linearGradient>
    <linearGradient id="bfloor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#122b1c"/>
      <stop offset="100%" stop-color="#08130c"/>
    </linearGradient>
    <radialGradient id="greenglow" cx="50%" cy="55%" r="65%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vign4" cx="50%" cy="50%" r="75%">
      <stop offset="55%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.6"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="640" fill="url(#bwall)"/>
  <rect y="640" width="1600" height="260" fill="url(#bfloor)"/>
  <rect width="1600" height="900" fill="url(#greenglow)"/>

  <!-- boiler, back center-right -->
  <ellipse cx="1010" cy="330" rx="150" ry="46" fill="#26343b"/>
  <rect x="860" y="330" width="300" height="290" fill="#31434c"/>
  <ellipse cx="1010" cy="620" rx="150" ry="42" fill="#223037"/>
  <g stroke="#1b262c" stroke-width="7">
    <path d="M880 360 V600 M950 344 V612 M1070 344 V612 M1140 360 V600"/>
  </g>
  <circle cx="1010" cy="430" r="34" fill="#151d21"/>
  <circle cx="1010" cy="430" r="24" fill="#d97706"/>
  <circle cx="1010" cy="430" r="12" fill="#fde68a"/>
  <rect x="960" y="520" width="100" height="66" rx="8" fill="#151d21"/>
  <path d="M978 542 q32 -20 64 0" stroke="#4ade80" stroke-width="5" fill="none"/>
  <!-- pipes -->
  <path d="M880 330 q-20 -120 60 -140 L940 90" stroke="#3d5560" stroke-width="22" fill="none"/>
  <path d="M1140 330 q30 -100 -20 -160" stroke="#3d5560" stroke-width="18" fill="none"/>
  <circle cx="940" cy="120" r="16" fill="#2a3b43"/>
  <path d="M940 60 q6 -18 0 -34 M960 70 q10 -12 8 -30" stroke="#5b7d8a" stroke-width="6" fill="none" opacity="0.5"/>

  <!-- ceiling beam + IRON HOOK (hotspot 40-52% x, 8-26% y) -->
  <rect x="200" y="60" width="1200" height="44" fill="#20160c"/>
  <path d="M200 60 h1200 M200 104 h1200" stroke="#100a05" stroke-width="6"/>
  <path d="M736 104 v52 q0 34 30 34 q26 0 26 -26 q0 -18 -18 -18" stroke="#7a8288" stroke-width="16" fill="none" stroke-linecap="round"/>
  <!-- rigged net silhouette behind hook -->
  <path d="M640 120 q120 60 320 6" stroke="#54452c" stroke-width="4" fill="none" opacity="0.55"/>
  <path d="M660 126 q100 90 280 10" stroke="#54452c" stroke-width="3.5" fill="none" opacity="0.45"/>

  <!-- BAIT CRATE (hotspot 42-58% x, 56-76% y) -->
  <g>
    <ellipse cx="800" cy="700" rx="130" ry="26" fill="#000" opacity="0.4"/>
    <path d="M672 540 L800 500 L928 540 L928 660 L800 700 L672 660 Z" fill="#6e4a1f"/>
    <path d="M672 540 L800 580 L928 540 M800 580 V700" stroke="#3f2a10" stroke-width="7" fill="none"/>
    <path d="M672 540 L800 500 L928 540 L800 580 Z" fill="#a9803c"/>
    <path d="M700 600 h72 M820 600 h72" stroke="#553917" stroke-width="6"/>
    <!-- the Scooby Snack on top -->
    <circle cx="800" cy="540" r="22" fill="#d98f2b"/>
    <circle cx="792" cy="534" r="3.4" fill="#7a4b12"/>
    <circle cx="808" cy="544" r="3.4" fill="#7a4b12"/>
    <circle cx="802" cy="530" r="26" fill="#ffd98a" opacity="0.2"/>
  </g>

  <!-- GLOWING BEDSHEET COSTUME (hotspot 76-90% x, 28-62% y) -->
  <g>
    <path d="M1300 240 h12 v20 h-12 z" fill="#54452c"/>
    <path d="M1240 268 q66 -36 132 0 l-8 210 q-18 40 -34 6 q-14 42 -30 6 q-16 40 -32 4 q-16 34 -30 -4 Z" fill="#bcd9a8"/>
    <path d="M1240 268 q66 -36 132 0 l-8 210 q-18 40 -34 6 q-14 42 -30 6 q-16 40 -32 4 q-16 34 -30 -4 Z" fill="#4ade80" opacity="0.25"/>
    <ellipse cx="1280" cy="330" rx="12" ry="18" fill="#0c1a10"/>
    <ellipse cx="1330" cy="330" rx="12" ry="18" fill="#0c1a10"/>
    <ellipse cx="1306" cy="340" rx="80" ry="90" fill="#4ade80" opacity="0.12"/>
    <path d="M1252 300 q-20 60 8 150" stroke="#8fbf7c" stroke-width="4" fill="none" opacity="0.6"/>
  </g>

  <!-- RED LEVER (hotspot 10-20% x, 44-70% y) -->
  <g>
    <rect x="176" y="416" width="120" height="200" rx="12" fill="#26343b"/>
    <rect x="192" y="432" width="88" height="60" rx="6" fill="#101a1e"/>
    <text x="236" y="458" font-family="Trebuchet MS" font-size="15" font-weight="bold" fill="#e8b73a" text-anchor="middle">LAUNDRY</text>
    <text x="236" y="478" font-family="Trebuchet MS" font-size="15" font-weight="bold" fill="#e8b73a" text-anchor="middle">NET</text>
    <path d="M236 560 L286 470" stroke="#5b6a72" stroke-width="14" stroke-linecap="round"/>
    <circle cx="290" cy="464" r="22" fill="#c22f2f"/>
    <circle cx="284" cy="458" r="7" fill="#ff8f8f" opacity="0.8"/>
    <circle cx="236" cy="562" r="14" fill="#151d21"/>
  </g>

  <!-- glowing footprints across the floor -->
  <g fill="#4ade80" opacity="0.5">
    <ellipse cx="480" cy="750" rx="16" ry="8" transform="rotate(18 480 750)"/>
    <ellipse cx="560" cy="780" rx="16" ry="8" transform="rotate(24 560 780)"/>
    <ellipse cx="650" cy="806" rx="16" ry="8" transform="rotate(16 650 806)"/>
    <ellipse cx="1060" cy="760" rx="16" ry="8" transform="rotate(-20 1060 760)"/>
    <ellipse cx="1150" cy="730" rx="16" ry="8" transform="rotate(-26 1150 730)"/>
    <ellipse cx="1230" cy="694" rx="16" ry="8" transform="rotate(-30 1230 694)"/>
  </g>

  <rect width="1600" height="900" fill="url(#vign4)"/>
</svg>
