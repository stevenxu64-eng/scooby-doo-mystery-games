<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="skyg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#060d1e"/>
      <stop offset="55%" stop-color="#0c2233"/>
      <stop offset="100%" stop-color="#175046"/>
    </linearGradient>
    <linearGradient id="lawng" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22523a"/>
      <stop offset="60%" stop-color="#153b26"/>
      <stop offset="100%" stop-color="#0a2114"/>
    </linearGradient>
    <radialGradient id="moonhalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8ecf5" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#e8ecf5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vign2" cx="50%" cy="46%" r="72%">
      <stop offset="55%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.62"/>
