<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="cwall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#181410"/>
      <stop offset="100%" stop-color="#332a1e"/>
    </linearGradient>
    <linearGradient id="cfloor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#26201a"/>
      <stop offset="100%" stop-color="#120e0a"/>
    </linearGradient>
    <radialGradient id="bulbglow" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#ffe9b0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffe9b0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vign3" cx="50%" cy="50%" r="75%">
      <stop offset="55%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.65"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="620" fill="url(#cwall)"/>
  <rect y="620" width="1600" height="280" fill="url(#cfloor)"/>
  <path d="M0 620 H1600 V632 H0 Z" fill="#0b0806"/>

  <!-- hanging bulb + light cone -->
  <path d="M800 0 V150" stroke="#3a352c" stroke-width="5"/>
  <circle cx="800" cy="168" r="20" fill="#ffe9b0"/>
  <path d="M800 168 L520 900 L1080 900 Z" fill="url(#bulbglow)"/>

  <!-- SHADOWY SHELVES (hotspot 6-28% x, 22-56% y) -->
  <rect x="80" y="180" width="380" height="330" fill="#0d0a07"/>
  <g fill="#241c12">
    <rect x="92" y="200" width="356" height="16"/>
    <rect x="92" y="300" width="356" height="16"/>
    <rect x="92" y="400" width="356" height="16"/>
    <rect x="92" y="494" width="356" height="16"/>
  </g>
  <!-- dim cans; one leaks a green hint -->
  <g opacity="0.75">
    <rect x="120" y="240" width="46" height="60" rx="4" fill="#1c1812"/>
    <rect x="180" y="248" width="40" height="52" rx="4" fill="#211a12"/>
    <rect x="250" y="238" width="50" height="62" rx="4" fill="#191510"/>
    <rect x="120" y="342" width="44" height="58" rx="4" fill="#1c1812"/>
    <rect x="190" y="348" width="52" height="52" rx="4" fill="#161310"/>
    <rect x="280" y="340" width="46" height="60" rx="4" fill="#1f1a13"/>
    <rect x="350" y="346" width="44" height="54" rx="4" fill="#181410"/>
  </g>
  <rect x="352" y="238" width="52" height="62" rx="4" fill="#12200f"/>
  <path d="M352 268 h52" stroke="#3f7a3a" stroke-width="4" opacity="0.5"/>
  <circle cx="378" cy="300" r="26" fill="#4ade80" opacity="0.07"/>

  <!-- mop & bucket -->
  <path d="M520 400 L560 640" stroke="#6b563a" stroke-width="10"/>
  <path d="M545 636 q16 44 30 8 q6 30 22 4 q8 26 20 2 L600 630 Z" fill="#b8b09a"/>
  <path d="M470 660 a46 30 0 0 0 92 0 l-8 -50 h-76 Z" fill="#3e4c55"/>
  <ellipse cx="516" cy="610" rx="38" ry="12" fill="#222d33"/>

  <!-- CRUMPLED INVOICE (hotspot 46-58% x, 50-62% y) on a stool -->
  <rect x="740" y="510" width="130" height="16" rx="6" fill="#40342a"/>
  <path d="M756 526 l-12 96 M844 526 l16 96 M800 526 v96" stroke="#40342a" stroke-width="10"/>
  <g transform="rotate(-6 800 480)">
    <path d="M752 452 l96 -6 l8 46 l-14 8 l6 12 l-90 8 Z" fill="#e0d6b4"/>
    <path d="M766 466 l60 -4 M768 480 l68 -4 M772 494 l52 -2" stroke="#8f825e" stroke-width="3"/>
    <path d="M812 500 l30 -2" stroke="#7c1f1f" stroke-width="3"/>
  </g>

  <!-- ROPE COIL (hotspot 68-82% x, 26-48% y) -->
  <circle cx="1196" cy="266" r="12" fill="#4a4038"/>
  <g fill="none" stroke="#b98b4e" stroke-width="14">
    <circle cx="1196" cy="336" r="66"/>
    <circle cx="1196" cy="336" r="42"/>
  </g>
  <g fill="none" stroke="#8a6636" stroke-width="4" opacity="0.8">
    <circle cx="1196" cy="336" r="74"/>
    <circle cx="1196" cy="336" r="56"/>
    <circle cx="1196" cy="336" r="32"/>
  </g>
  <path d="M1148 388 q-16 40 10 44" stroke="#b98b4e" stroke-width="12" fill="none" stroke-linecap="round"/>

  <!-- broom leaning right -->
  <path d="M1420 300 L1360 640" stroke="#6b563a" stroke-width="9"/>
  <path d="M1345 632 l44 8 q-2 46 -18 60 l-40 -8 q12 -30 14 -60" fill="#a3803e"/>

  <!-- FLOOR GRATE (hotspot 38-62% x, 72-92% y) with padlock + green glow below -->
  <rect x="600" y="640" width="400" height="192" rx="14" fill="#0a0d0b"/>
  <rect x="614" y="652" width="372" height="168" rx="8" fill="#131a15"/>
  <g stroke="#2c3a31" stroke-width="8">
    <path d="M648 660 v152 M712 660 v152 M776 660 v152 M840 660 v152 M904 660 v152 M958 660 v152"/>
  </g>
  <path d="M614 700 h372 M614 760 h372" stroke="#243029" stroke-width="6"/>
  <rect x="600" y="640" width="400" height="192" rx="14" fill="#4ade80" opacity="0.07"/>
  <!-- padlock -->
  <rect x="768" y="618" width="62" height="52" rx="10" fill="#8f8f96"/>
  <path d="M781 618 v-14 a18 18 0 0 1 36 0 v14" stroke="#6e6e74" stroke-width="10" fill="none"/>
  <circle cx="799" cy="644" r="8" fill="#3c3c42"/>

  <rect width="1600" height="900" fill="url(#vign3)"/>
</svg>
