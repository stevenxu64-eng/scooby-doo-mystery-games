<svg xmlns="http://www.w3.org/2000/svg" width="64" height="72" viewBox="0 0 64 72">
  <!-- Scooby: feet anchored at bottom-center -->
  <ellipse cx="32" cy="67" rx="16" ry="5" fill="rgba(0,0,0,0.4)"/>
  <!-- tail -->
  <path d="M45 46 Q54 42 53 33" stroke="#8a5a20" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- hind legs -->
  <rect x="22" y="54" width="7" height="14" rx="3" fill="#9a6624"/>
  <rect x="35" y="54" width="7" height="14" rx="3" fill="#9a6624"/>
  <!-- body -->
  <ellipse cx="32" cy="46" rx="15" ry="13" fill="#b3782c"/>
  <ellipse cx="38" cy="49" rx="5" ry="3.6" fill="#7c4f1c"/>
  <ellipse cx="25" cy="41" rx="3.6" ry="2.6" fill="#7c4f1c"/>
  <!-- front paws -->
  <rect x="25" y="58" width="6" height="10" rx="3" fill="#b3782c"/>
  <rect x="33" y="58" width="6" height="10" rx="3" fill="#b3782c"/>
  <!-- collar -->
  <rect x="24" y="30" width="16" height="5" rx="2.5" fill="#2a9db5"/>
  <path d="M32 35 l4 4 -4 4 -4 -4 z" fill="#f5c33b" stroke="#b78d1e" stroke-width="1"/>
  <!-- head -->
  <ellipse cx="32" cy="20" rx="13" ry="11" fill="#b3782c"/>
  <!-- ears -->
  <path d="M20 12 Q16 2 22 3 Q27 4 26 12 Z" fill="#8a5a20"/>
  <path d="M44 12 Q48 2 42 3 Q37 4 38 12 Z" fill="#8a5a20"/>
  <!-- muzzle -->
  <ellipse cx="32" cy="25" rx="8.5" ry="6" fill="#c89a55"/>
  <ellipse cx="32" cy="22" rx="3.4" ry="2.4" fill="#241a10"/>
  <path d="M27 28 Q32 31 37 28" stroke="#241a10" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <!-- eyes -->
  <ellipse cx="27.5" cy="15.5" rx="3" ry="3.6" fill="#fff"/>
  <ellipse cx="36.5" cy="15.5" rx="3" ry="3.6" fill="#fff"/>
  <circle cx="28" cy="16.4" r="1.5" fill="#241a10"/>
  <circle cx="36" cy="16.4" r="1.5" fill="#241a10"/>
  <!-- worried brows -->
  <path d="M24 10.5 q3 -2 6 -0.5" stroke="#7c4f1c" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M34 10 q3 -1.5 6 0.5" stroke="#7c4f1c" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
